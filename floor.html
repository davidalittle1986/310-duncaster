<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Floor Plan — 310 Duncaster</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="310 Duncaster" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
</head>
<body>
  <!-- Loading screen -->
  <div class="loader" id="loader">
    <div class="loader-inner">
      <div class="loader-title">310 Duncaster</div>
      <div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div>
    </div>
  </div>

  <div class="floor-page page-enter" id="floor-page" style="opacity:0">
    <nav class="nav-bar">
      <div class="nav-crumb">
        <a href="index.html">Home</a>
        <span class="nav-sep">›</span>
        <span id="floor-title">—</span>
      </div>
      <button class="measure-toggle" id="measure-toggle">Measure</button>
    </nav>
    <div class="nav-page-title" id="floor-title-large">—</div>

    <div class="floorplan-wrapper" id="fp-wrapper">
      <div class="floorplan-zoom-container" id="zoom-container">
        <img id="floorplan-img" src="" alt="Floor plan" />
        <svg class="hotspot-svg" id="hotspot-svg" viewBox="0 0 1000 1000" preserveAspectRatio="none">
        </svg>
        <svg class="measure-svg" id="measure-svg" preserveAspectRatio="none"></svg>
      </div>
      <p class="hotspot-hint" id="hotspot-hint">Tap a room to view construction photos</p>
    </div>

    <!-- Measure toolbar -->
    <div class="measure-bar" id="measure-bar">
      <div class="measure-readout" id="measure-readout">Pinch to zoom · drag to measure</div>
      <div class="measure-actions">
        <button class="measure-btn" id="clear-btn">Clear</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/config.js"></script>
  <script>
    const floorKey = location.hash.slice(1) || 'downstairs';
    const floor    = SITE.floors[floorKey];
    if (!floor) location.href = 'index.html';

    document.title = `${floor.label} — 310 Duncaster`;
    document.getElementById('floor-title').textContent       = floor.label;
    document.getElementById('floor-title-large').textContent = floor.label;

    const img        = document.getElementById('floorplan-img');
    const measureSvg = document.getElementById('measure-svg');
    img.src = floor.floorplan;

    // Loading screen
    const loader     = document.getElementById('loader');
    const loaderFill = document.getElementById('loader-fill');
    const page       = document.getElementById('floor-page');

    loaderFill.style.width = '30%';
    img.onload = () => {
      loaderFill.style.width = '100%';
      setTimeout(() => {
        loader.style.opacity = '0';
        loader.style.pointerEvents = 'none';
        page.style.opacity = '1';
        page.style.transition = 'opacity 0.4s';
        setTimeout(() => loader.style.display = 'none', 400);
      }, 300);
      measureSvg.setAttribute('viewBox', `0 0 ${img.naturalWidth} ${img.naturalHeight}`);
      buildHotspots();
    };
    if (img.complete && img.naturalWidth) img.onload();

    // ── Hotspots ────────────────────────────────────────────────
    function buildHotspots() {
      const svg = document.getElementById('hotspot-svg');
      floor.rooms.forEach(room => {
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.setAttribute('class', 'hotspot-group');
        g.setAttribute('data-room', room.id);
        g.setAttribute('role', 'button');
        g.setAttribute('tabindex', '0');
        g.setAttribute('aria-label', room.label);

        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('class', 'hotspot-circle');
        circle.setAttribute('cx', room.x); circle.setAttribute('cy', room.y); circle.setAttribute('r', '38');

        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('class', 'hotspot-label');
        text.setAttribute('x', room.x); text.setAttribute('y', room.y);
        text.textContent = room.label;

        g.appendChild(circle); g.appendChild(text); svg.appendChild(g);
        g.addEventListener('click', () => { if (!measureMode) navigateToRoom(room, floorKey); });
        g.addEventListener('keydown', e => {
          if ((e.key === 'Enter' || e.key === ' ') && !measureMode) navigateToRoom(room, floorKey);
        });
      });
    }

    function navigateToRoom(room, floor) {
      const s = 3.5;
      const cx = (room.x / 1000) * img.offsetWidth;
      const cy = (room.y / 1000) * img.offsetHeight;
      zc.classList.add('animating', 'zooming');
      zc.style.transform = `translate(${cx - cx * s}px, ${cy - cy * s}px) scale(${s})`;
      setTimeout(() => { location.href = `gallery.html#${floor}/${room.id}`; }, 550);
    }

    // ── Measure mode ────────────────────────────────────────────
    const SCALE_KEY = `measure_scale_${floorKey}`;
    let measureMode = false;
    let bakedScales = {};
    const NS = 'http://www.w3.org/2000/svg';

    fetch('scales.json?t=' + Date.now())
      .then(r => r.ok ? r.json() : {})
      .then(j => { bakedScales = j || {}; })
      .catch(() => {});

    function getScale() {
      const v = parseFloat(localStorage.getItem(SCALE_KEY));
      if (!isNaN(v)) return v;
      const b = parseFloat(bakedScales[floorKey]);
      return isNaN(b) ? null : b;
    }

    const measureToggle = document.getElementById('measure-toggle');
    const readout = document.getElementById('measure-readout');
    const hint    = document.getElementById('hotspot-hint');
    const toast   = document.getElementById('toast');

    measureToggle.addEventListener('click', () => {
      measureMode = !measureMode;
      document.body.classList.toggle('measuring', measureMode);
      measureToggle.classList.toggle('active', measureMode);
      measureToggle.textContent = measureMode ? 'Done' : 'Measure';
      hint.textContent = measureMode
        ? 'Pinch to zoom · drag one finger to measure'
        : 'Tap a room to view construction photos';
      updateReadout();
    });

    function updateReadout(msg) {
      readout.textContent = msg || (getScale()
        ? 'Pinch to zoom · drag to measure'
        : 'Scale not set yet');
    }
    function showToast(m) { toast.textContent = m; toast.classList.add('active'); setTimeout(() => toast.classList.remove('active'), 2400); }

    document.getElementById('clear-btn').addEventListener('click', () => {
      [...measureSvg.querySelectorAll('.m-line,.m-end,.m-label')].forEach(n => n.remove());
      updateReadout();
    });

    // Convert a screen point to natural-pixel image coordinates.
    // Uses the image's bounding rect (which reliably includes CSS transforms in
    // all browsers) instead of getScreenCTM(), which Safari computes without
    // ancestor CSS transforms — that broke drawing while zoomed.
    function toSvg(clientX, clientY) {
      const r = img.getBoundingClientRect();
      return {
        x: ((clientX - r.left) / r.width)  * img.naturalWidth,
        y: ((clientY - r.top)  / r.height) * img.naturalHeight
      };
    }

    function formatFeet(totalFeet) {
      let feet = Math.floor(totalFeet);
      let inches = Math.round((totalFeet - feet) * 12);
      if (inches === 12) { feet += 1; inches = 0; }
      return `${feet}' ${inches}"`;
    }

    // Drawing
    let drawing = false, startPt = null, curLine = null, curEnds = [], lastDistPx = 0;
    const strokeW = () => Math.max(2, (img.naturalWidth || 2000) / 320);
    const endR    = () => Math.max(3, (img.naturalWidth || 2000) / 280);
    const fontPx  = () => Math.max(10, (img.naturalWidth || 2000) / 42);

    function beginDraw(clientX, clientY) {
      startPt = toSvg(clientX, clientY);
      drawing = true; lastDistPx = 0;
      curLine = document.createElementNS(NS, 'line');
      curLine.setAttribute('class', 'm-line');
      curLine.setAttribute('x1', startPt.x); curLine.setAttribute('y1', startPt.y);
      curLine.setAttribute('x2', startPt.x); curLine.setAttribute('y2', startPt.y);
      curLine.setAttribute('stroke-width', strokeW());
      measureSvg.appendChild(curLine);
      curEnds = [];
      [0,1].forEach(() => {
        const c = document.createElementNS(NS, 'circle');
        c.setAttribute('class', 'm-end'); c.setAttribute('r', endR());
        c.setAttribute('cx', startPt.x); c.setAttribute('cy', startPt.y);
        measureSvg.appendChild(c); curEnds.push(c);
      });
    }
    function moveDraw(clientX, clientY) {
      if (!drawing) return;
      const p = toSvg(clientX, clientY);
      curLine.setAttribute('x2', p.x); curLine.setAttribute('y2', p.y);
      curEnds[1].setAttribute('cx', p.x); curEnds[1].setAttribute('cy', p.y);
      lastDistPx = Math.hypot(p.x - startPt.x, p.y - startPt.y);
      const scale = getScale();
      if (scale) updateReadout(formatFeet(lastDistPx * scale));
    }
    function endDraw() {
      if (!drawing) return;
      drawing = false;
      if (lastDistPx < 4) { curLine.remove(); curEnds.forEach(c => c.remove()); return; }
      const scale = getScale();
      if (scale) addLabel(curLine, formatFeet(lastDistPx * scale));
      else showToast('Scale not set for this floor');
    }
    function cancelDraw() {
      if (!drawing) return;
      drawing = false;
      curLine.remove(); curEnds.forEach(c => c.remove());
    }
    function addLabel(line, text) {
      const mx = (parseFloat(line.getAttribute('x1')) + parseFloat(line.getAttribute('x2'))) / 2;
      const my = (parseFloat(line.getAttribute('y1')) + parseFloat(line.getAttribute('y2'))) / 2;
      const t = document.createElementNS(NS, 'text');
      t.setAttribute('class', 'm-label'); t.setAttribute('x', mx); t.setAttribute('y', my);
      t.setAttribute('font-size', fontPx()); t.textContent = text;
      measureSvg.appendChild(t);
    }

    // ── Unified gesture controller ──────────────────────────────
    const wrapper = document.getElementById('fp-wrapper');
    const zc      = document.getElementById('zoom-container');
    let scale = 1, tx = 0, ty = 0;
    let gesture = null;                 // 'pinch' | 'pan' | 'draw' | null
    let lastDist = 0, lastMidX = 0, lastMidY = 0, lastPanX = 0, lastPanY = 0;
    const MAX_SCALE = 6;

    function applyTransform() { zc.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`; }
    function clampPan() {
      const maxX = Math.max(0, (img.offsetWidth  * scale - wrapper.clientWidth)  / 2 + 60);
      const maxY = Math.max(0, (img.offsetHeight * scale - wrapper.clientHeight) / 2 + 60);
      tx = Math.min(maxX, Math.max(-maxX, tx));
      ty = Math.min(maxY, Math.max(-maxY, ty));
    }
    function rel(touch) { const r = wrapper.getBoundingClientRect(); return { x: touch.clientX - r.left, y: touch.clientY - r.top }; }
    function mid(a, b) { const r = wrapper.getBoundingClientRect(); return { x: (a.clientX + b.clientX) / 2 - r.left, y: (a.clientY + b.clientY) / 2 - r.top }; }

    function startPinch(e) {
      gesture = 'pinch';
      if (drawing) cancelDraw();
      zc.classList.remove('animating');
      lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const m = mid(e.touches[0], e.touches[1]); lastMidX = m.x; lastMidY = m.y;
    }
    function startOneFinger(e) {
      if (measureMode) { gesture = 'draw'; beginDraw(e.touches[0].clientX, e.touches[0].clientY); }
      else if (scale > 1.01) { gesture = 'pan'; const p = rel(e.touches[0]); lastPanX = p.x; lastPanY = p.y; zc.classList.remove('animating'); }
      else gesture = null;
    }

    wrapper.addEventListener('touchstart', e => {
      if (e.touches.length === 2) { e.preventDefault(); startPinch(e); }
      else if (e.touches.length === 1) {
        if (measureMode || scale > 1.01) e.preventDefault();
        startOneFinger(e);
      }
    }, { passive: false });

    wrapper.addEventListener('touchmove', e => {
      if (gesture === 'pinch' && e.touches.length === 2) {
        e.preventDefault();
        const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        const m = mid(e.touches[0], e.touches[1]);
        let desired = Math.min(MAX_SCALE, Math.max(1, scale * (dist / lastDist)));
        const factor = desired / scale;
        tx = m.x - (m.x - tx) * factor;
        ty = m.y - (m.y - ty) * factor;
        scale = desired;
        tx += m.x - lastMidX; ty += m.y - lastMidY;
        lastDist = dist; lastMidX = m.x; lastMidY = m.y;
        clampPan(); applyTransform();
      } else if (gesture === 'draw' && e.touches.length === 1) {
        e.preventDefault();
        moveDraw(e.touches[0].clientX, e.touches[0].clientY);
      } else if (gesture === 'pan' && e.touches.length === 1) {
        e.preventDefault();
        const p = rel(e.touches[0]);
        tx += p.x - lastPanX; ty += p.y - lastPanY; lastPanX = p.x; lastPanY = p.y;
        clampPan(); applyTransform();
      }
    }, { passive: false });

    wrapper.addEventListener('touchend', e => {
      if (e.touches.length === 0) {
        if (gesture === 'draw') endDraw();
        else if (gesture === 'pinch' || gesture === 'pan') {
          if (scale <= 1.02) { scale = 1; tx = 0; ty = 0; }
          else clampPan();
          zc.classList.add('animating'); applyTransform();
          setTimeout(() => zc.classList.remove('animating'), 300);
        }
        gesture = null;
      } else if (e.touches.length === 1) {
        // dropped from two fingers to one — continue with the remaining finger
        if (gesture === 'pinch' || gesture === 'pan') startOneFinger(e);
      }
    }, { passive: true });

    // Double-tap to zoom in / reset (not in measure mode)
    let lastTap = 0;
    wrapper.addEventListener('touchend', e => {
      if (measureMode || e.changedTouches.length !== 1 || gesture === 'draw') return;
      const now = Date.now();
      if (now - lastTap < 300) {
        const p = rel(e.changedTouches[0]);
        zc.classList.add('animating');
        if (scale > 1.2) { scale = 1; tx = 0; ty = 0; }
        else { const target = 3, f = target / scale; tx = p.x - (p.x - tx) * f; ty = p.y - (p.y - ty) * f; scale = target; clampPan(); }
        applyTransform();
        setTimeout(() => zc.classList.remove('animating'), 300);
        lastTap = 0;
      } else lastTap = now;
    }, { passive: true });

    // Back-swipe (only when not zoomed, not measuring)
    let backStartX = 0;
    document.addEventListener('touchstart', e => { backStartX = e.touches[0].clientX; }, { passive: true });
    document.addEventListener('touchend', e => {
      if (measureMode || scale > 1.02) return;
      const dx = e.changedTouches[0].clientX - backStartX;
      if (dx > 80 && backStartX < 40) history.back();
    }, { passive: true });

    // Mouse support (desktop)
    wrapper.addEventListener('mousedown', e => { if (measureMode) { gesture = 'draw'; beginDraw(e.clientX, e.clientY); } });
    wrapper.addEventListener('mousemove', e => { if (gesture === 'draw' && drawing) moveDraw(e.clientX, e.clientY); });
    window.addEventListener('mouseup', () => { if (gesture === 'draw') { endDraw(); gesture = null; } });
  </script>
</body>
</html>
